{% extends "base.html" %}
{% block title %}QuantumStudy — Login{% endblock %}

{% block content %}
<div class="splash">
  <div class="hero-banner">
    <h1 class="hero-title">QuantumStudy</h1>
    <p class="hero-sub">Learn from graduates &amp; upperclassmen</p>
  </div>

  <div class="login-card">
    <h2 class="card-heading">Sign in</h2>
    <form method="POST" action="{{ url_for('login') }}" class="form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" name="email" placeholder="you@school.kz" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="••••••••" required />
      </div>
      <button class="btn btn--primary btn--full" type="submit">Log in</button>
    </form>
    <p class="login-link">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
  </div>
</div>
{% endblock %}
